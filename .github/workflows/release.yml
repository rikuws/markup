name: Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS app package
    runs-on: macos-latest
    env:
      MARKUP_ALLOW_DEVELOPMENT_PACKAGE: "1"
      MARKUP_SIGNING_MODE: adhoc

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "MARKUP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "MARKUP_BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Build distributable package
        run: ./scripts/package-app.sh

      - name: Prepare release assets
        run: |
          set -euo pipefail

          rm -rf release-assets
          mkdir -p release-assets

          for artifact in dist/markup-*.dmg dist/markup-*.zip; do
            cp "$artifact" "release-assets/$(basename "$artifact")"
          done

          latest_dmg="$(find dist -maxdepth 1 -name 'markup-*.dmg' -print | sort | tail -n 1)"
          latest_zip="$(find dist -maxdepth 1 -name 'markup-*.zip' -print | sort | tail -n 1)"

          cp "$latest_dmg" release-assets/markup-latest-macos.dmg
          cp "$latest_zip" release-assets/markup-latest-macos.zip

          shasum -a 256 release-assets/* > release-assets/SHA256SUMS.txt

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: markup-macos
          path: release-assets/*
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "Markup ${RELEASE_TAG#v}" \
              --notes "Automated macOS build for ${RELEASE_TAG}." \
              --verify-tag
          fi

          gh release upload "$RELEASE_TAG" release-assets/* --clobber
